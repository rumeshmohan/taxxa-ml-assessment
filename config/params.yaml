# DATA_DIR env var controls where parquet data is read from (default: ./data)
# All relative paths below are resolved against DATA_DIR at runtime.

# GLOBAL ACTIVE PROVIDERS
active_generator:
  provider: groq          # groq | openai | ollama | deepseek | gemini
  tier: strong            # general | strong | reason

active_embedding:
  provider: openai
  tier: default

# PART 1: RAG EVALUATION
rag:
  top_k: 10
  rrf_k: 60
  embedding_dim: 3072     # text-embedding-3-large dimension

  data:
    sources:
      - "skatdk/2026-04-09"
      - "erhvervsstyrelsen/2026-04-09"
      - "retsinformation/2026-04-09"
    queries_file: "queries_dk_2026-04-09.parquet"
    max_retsinformation_parts: 10   # OOM guard for large corpus

  output:
    results_csv: "part1_rag_eval/outputs/part1_results.csv"
    log_file:    "part1_rag_eval/outputs/part1_run.log"

# PART 2: FINE-TUNING
finetuning:
  llm_params:
    temperature: 0.3
    max_tokens: 512

  data:
    chunks_sources:
      - "kila/2026-04-09"
    eval_queries_file: "queries_fi_2026-04-09.parquet"
    synthetic_train_path: "part2_fine_tuning/data/synthetic_kila_train.jsonl"
    synthetic_val_path:   "part2_fine_tuning/data/synthetic_kila_val.jsonl"
    val_doc_ids_path:     "part2_fine_tuning/data/val_doc_ids.json"
    min_chunk_len: 120        # chars — shorter chunks rarely yield good Q&A
    val_ratio: 0.10
    random_seed: 42
    batch_size: 15            # chunks per batch before long pause
    batch_delay_sec: 20       # pause after each batch (clears TPM)
    rpm_delay_sec: 2.1        # pause between individual LLM calls (30 RPM limit)

  model:
    base_model_id: "Qwen/Qwen2.5-7B-Instruct"
    max_seq_length: 2048

  lora:
    r: 16
    lora_alpha: 32
    lora_dropout: 0.05
    target_modules:
      - q_proj
      - k_proj
      - v_proj
      - o_proj
      - gate_proj
      - up_proj
      - down_proj

  training:
    per_device_train_batch_size: 2
    gradient_accumulation_steps: 4
    learning_rate: 0.0002
    num_train_epochs: 3
    lr_scheduler_type: cosine
    warmup_steps: 10
    logging_steps: 5
    save_steps: 50
    save_total_limit: 2
    output_dir: "part2_fine_tuning/outputs/kila-adapter"

  eval:
    judge_provider: groq
    judge_model: "llama-3.3-70b-versatile"
    adapter_path: "part2_fine_tuning/outputs/kila-adapter/final_adapter"
    results_csv:  "part2_fine_tuning/outputs/eval_summary.csv"
    loss_curve_png: "part2_fine_tuning/outputs/training_loss_curve.png"
